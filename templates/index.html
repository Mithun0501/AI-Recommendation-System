<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Movie Recommendation System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

body{
    background:#0f172a;
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px;
}

.main-card{
    width:950px;
    background:#1e293b;
    border-radius:25px;
    padding:35px;
    box-shadow:0 0 30px rgba(59,130,246,0.3);
}

.title{
    text-align:center;
    font-size:3rem;
    font-weight:bold;
    margin-bottom:10px;
}

.title span{
    color:#3b82f6;
}

.subtitle{
    text-align:center;
    color:#94a3b8;
    margin-bottom:30px;
}

.search-box{
    height:60px;
    border-radius:15px;
    font-size:18px;
}

.btn-ai{
    background:#3b82f6;
    border:none;
    height:55px;
    font-size:18px;
    border-radius:15px;
    transition:.3s;
}

.btn-ai:hover{
    transform:scale(1.03);
    background:#2563eb;
}

.result-title{
    margin-top:35px;
    margin-bottom:20px;
    color:#38bdf8;
}

.movie-card{
    background:#334155;
    border:none;
    border-radius:15px;
    padding:15px;
    margin-bottom:12px;
    transition:.3s;
}

.movie-card:hover{
    transform:translateY(-5px);
    background:#475569;
}

.footer{
    text-align:center;
    margin-top:30px;
    color:#94a3b8;
    font-size:14px;
}

</style>

</head>

<body>

<div class="main-card">

    <h1 class="title">
        🎬 <span>AI</span> Movie Recommendation
    </h1>

    <p class="subtitle">
        Discover movies powered by Machine Learning & Cosine Similarity
    </p>

    <form method="POST">

        <div class="input-group">

            <span class="input-group-text">
                <i class="fas fa-film"></i>
            </span>

            <input
                type="text"
                name="movie"
                class="form-control search-box"
                placeholder="Enter movie name (Avatar, Titanic, Spider-Man...)"
                required>

        </div>

        <br>

        <button class="btn btn-ai w-100">
            🤖 Get Recommendations
        </button>

    </form>

    {% if recommendations %}

    <h3 class="result-title">
        Recommended Movies For You
    </h3>

    {% for movie in recommendations %}

    <div class="movie-card">
        <h5>🎥 {{ movie }}</h5>
    </div>

    {% endfor %}

    {% endif %}

    <div class="footer">
        Built using Python • Flask • Machine Learning • Cosine Similarity
    </div>

</div>

</body>

</html>
